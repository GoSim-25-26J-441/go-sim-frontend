# CI: npm ci → typecheck → test → lint → build. Deploy on push to main (artifact to S3, SSM runs script from S3).
# Required secrets: AWS_ROLE_ARN, AWS_REGION, DEPLOY_BUCKET, EC2_INSTANCE_ID
# Build-time env (for NEXT_PUBLIC_* and next.config): NEXT_PUBLIC_BACKEND_BASE, BACKEND_BASE; optional: NEXT_PUBLIC_APP_NAME, NEXT_PUBLIC_FIREBASE_*

name: CI

on:
  push:
    branches: [main, dev, ci]
  pull_request:
    branches: [main, dev, ci]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}
      NEXT_PUBLIC_BACKEND_BASE: ${{ secrets.NEXT_PUBLIC_BACKEND_BASE }}
      BACKEND_BASE: ${{ secrets.BACKEND_BASE }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: [ci]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}
      NEXT_PUBLIC_BACKEND_BASE: ${{ secrets.NEXT_PUBLIC_BACKEND_BASE }}
      BACKEND_BASE: ${{ secrets.BACKEND_BASE }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    concurrency:
      group: deploy-main
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Create build artifact
        run: |
          tar -czf build.tar.gz .next public package.json package-lock.json ecosystem.config.js scripts/app.microsim.dev.conf

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload build to S3
        run: aws s3 cp build.tar.gz s3://${{ secrets.DEPLOY_BUCKET }}/go-sim-frontend/build.tar.gz

      - name: Upload deploy script to S3
        run: aws s3 cp scripts/deploy-ec2.sh s3://${{ secrets.DEPLOY_BUCKET }}/go-sim-frontend/scripts/deploy.sh

      - name: Deploy via SSM Run Command
        id: ssm
        env:
          BUCKET: ${{ secrets.DEPLOY_BUCKET }}
          REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          cmd="aws s3 cp s3://${BUCKET}/go-sim-frontend/scripts/deploy.sh /tmp/deploy.sh --region ${REGION} && chmod +x /tmp/deploy.sh && /tmp/deploy.sh ${BUCKET} ${REGION}"
          json_commands=$(echo -n "$cmd" | jq -Rs .)
          cmd_id=$(aws ssm send-command \
            --region "${REGION}" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters "{\"commands\":[$json_commands]}" \
            --timeout-seconds 600 \
            --comment "Deploy go-sim-frontend from GitHub Actions" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$cmd_id" >> "$GITHUB_OUTPUT"
          instance_id="${{ secrets.EC2_INSTANCE_ID }}"
          echo "Waiting for SSM command ${cmd_id} (get-command-invocation Status / ResponseCode only; no HTTP healthcheck)..."
          deadline=$((SECONDS + 600))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            status=$(aws ssm get-command-invocation \
              --command-id "$cmd_id" \
              --instance-id "${instance_id}" \
              --region "${REGION}" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            case "${status}" in
              Success)
                exit_code=$(aws ssm get-command-invocation \
                  --command-id "$cmd_id" \
                  --instance-id "${instance_id}" \
                  --region "${REGION}" \
                  --query "ResponseCode" \
                  --output text)
                if [ "${exit_code}" != "0" ]; then
                  echo "SSM command reported Success but ResponseCode=${exit_code}"
                  aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "${instance_id}" --region "${REGION}"
                  exit 1
                fi
                echo "Deploy completed successfully (SSM Status=Success, ResponseCode=0)"
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                echo "SSM command finished with terminal status: ${status}"
                aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "${instance_id}" --region "${REGION}"
                exit 1
                ;;
              Pending|InProgress|Delayed|Cancelling|"")
                echo "SSM status: ${status:-Pending}"
                sleep 5
                ;;
              *)
                echo "SSM status (unexpected, will keep polling): ${status}"
                sleep 5
                ;;
            esac
          done
          echo "Timed out waiting for SSM command after 600s"
          aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "${instance_id}" --region "${REGION}" || true
          exit 1
